<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Theme Color (支持 light/dark 模式) -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- PWA & Apple Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Homepage" />

    <!-- Security & Privacy Meta Tags -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />

    <!-- DNS Prefetch & Preconnect for Icons -->
    <link rel="dns-prefetch" href="//api.iconify.design" />
    <link rel="preconnect" href="https://api.iconify.design" crossorigin />
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="//cdn.busuanzi.cc" />
    <link rel="preconnect" href="https://cdn.busuanzi.cc" crossorigin />
    <link rel="dns-prefetch" href="//avatars.githubusercontent.com" />
    <link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin />

    <!-- Font Preload (Inter) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" as="style" />
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v12/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hjp-Ek-_EeA.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Module Preload for Critical Modules -->
    <link rel="modulepreload" href="/src/main.ts" />
    <link rel="modulepreload" href="/src/App.vue" />

    <!-- Iconify API Configuration for faster icon loading -->
    <script>
      // Configure Iconify to use multiple API sources for reliability
      window.__IconifyConfig = {
        defaultAPI: 'https://api.iconify.design',
        api: {
          // Primary: Iconify official API (fast, reliable)
          '': {
            resources: ['https://api.iconify.design'],
          },
        },
      };
    </script>

    <!-- SEO Meta Tags (will be dynamically updated by JavaScript) -->
    <title data-react-helmet="true">homepage</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />

    <!-- Canonical URL -->
    <link rel="canonical" href="" />

    <script async src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
